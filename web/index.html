<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake3D in the Browser</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <style>
        :root {
            --bg: #0b1220;
            --bg-soft: #111b2f;
            --panel: #14213a;
            --accent: #58d68d;
            --accent-soft: #2f855a;
            --text: #e5edf9;
            --muted: #9fb2cf;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Fira Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 700px at 10% -20%, #1f2c46, transparent),
                radial-gradient(1100px 650px at 90% 120%, #20375d, transparent),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .app {
            width: min(1080px, 100%);
            display: grid;
            gap: 14px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(5, minmax(90px, 1fr));
            gap: 10px;
            background: color-mix(in srgb, var(--panel) 80%, black 20%);
            border: 1px solid #2a3f66;
            border-radius: 12px;
            padding: 12px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            font-size: 12px;
            color: var(--muted);
        }

        .field input {
            background: var(--bg-soft);
            border: 1px solid #2b436e;
            color: var(--text);
            border-radius: 8px;
            font: inherit;
            padding: 8px;
        }

        .actions {
            display: grid;
            gap: 8px;
            align-content: end;
        }

        button {
            height: 40px;
            border: 0;
            border-radius: 9px;
            font: inherit;
            font-weight: 700;
            color: #081421;
            background: linear-gradient(135deg, #73f2ac, var(--accent));
            cursor: pointer;
        }

        button:disabled {
            cursor: progress;
            opacity: 0.7;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 13px;
        }

        .terminal-wrap {
            border: 1px solid #2a3f66;
            border-radius: 12px;
            background: #050b14;
            padding: 8px;
            box-shadow: 0 20px 40px rgb(0 0 0 / 35%);
        }

        #terminal {
            width: 100%;
            height: 68vh;
            min-height: 460px;
        }

        @media (max-width: 900px) {
            .toolbar {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }

            .actions {
                grid-column: 1 / -1;
            }

            #terminal {
                min-height: 380px;
                height: 62vh;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="toolbar">
            <div class="field">
                <label for="width">Width</label>
                <input id="width" type="number" min="4" max="20" value="8" />
            </div>
            <div class="field">
                <label for="height">Height</label>
                <input id="height" type="number" min="4" max="20" value="8" />
            </div>
            <div class="field">
                <label for="depth">Depth</label>
                <input id="depth" type="number" min="4" max="20" value="8" />
            </div>
            <div class="field">
                <label for="tickRate">Tick/s</label>
                <input id="tickRate" type="number" min="1" max="30" step="0.5" value="6" />
            </div>
            <div class="actions">
                <button id="startButton" type="button">Start Game</button>
                <button id="restartButton" type="button">Force Restart</button>
            </div>
        </section>
        <div class="status" id="status">Loading page...</div>
        <section class="terminal-wrap">
            <div id="terminal"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>
    <script>
        const SOURCE_FILES = [
            "src/snake3d/__init__.py",
            "src/snake3d/adapters/__init__.py",
            "src/snake3d/adapters/terminal_renderer.py",
            "src/snake3d/adapters/terminal_size.py",
            "src/snake3d/core/__init__.py",
            "src/snake3d/core/engine.py",
            "src/snake3d/core/models.py",
            "src/snake3d/core/rules.py",
            "src/snake3d/core/state.py",
            "src/snake3d/ports/__init__.py",
            "src/snake3d/ports/input.py",
            "src/snake3d/ports/renderer.py",
        ];

        const terminal = new Terminal({
            cursorBlink: true,
            convertEol: true,
            fontFamily: "'Fira Code', 'Cascadia Mono', monospace",
            fontSize: 14,
            theme: {
                background: "#050b14",
                foreground: "#e5edf9",
                black: "#050b14",
                red: "#ff7f7f",
                green: "#8be9a8",
                yellow: "#ffe08a",
                blue: "#78b4f6",
                magenta: "#c1a3ff",
                cyan: "#7be9ef",
                white: "#dbe8fb",
                brightBlack: "#506386",
                brightRed: "#ff9f9f",
                brightGreen: "#b6f7cc",
                brightYellow: "#ffefb3",
                brightBlue: "#9bccff",
                brightMagenta: "#d8c5ff",
                brightCyan: "#a7f7ff",
                brightWhite: "#ffffff",
            },
        });
        const fitAddon = new FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);
        terminal.open(document.getElementById("terminal"));
        fitAddon.fit();

        const statusEl = document.getElementById("status");
        const startButton = document.getElementById("startButton");
        const restartButton = document.getElementById("restartButton");

        const keyQueue = [];
        let pyodide = null;
        let gameRunning = false;
        let stopRequested = false;
        let restartRequested = false;
        let measuredCols = 80;
        let measuredRows = 24;

        function syncTerminalGeometry() {
            fitAddon.fit();
            measuredCols = Math.max(Number(terminal.cols) || 0, 20);
            measuredRows = Math.max(Number(terminal.rows) || 0, 10);
        }

        function setStatus(message) {
            statusEl.textContent = message;
        }

        function mapInput(data) {
            if (data === "\u001b[A") {
                return "ext:k";
            }
            if (data === "\u001b[B") {
                return "ext:p";
            }
            if (data === "\u001b[C") {
                return "ext:m";
            }
            if (data === "\u001b[D") {
                return "ext:h";
            }
            if (data === "\u001b") {
                return "esc";
            }
            if (data.length === 1) {
                return data.toLowerCase();
            }
            return null;
        }

        terminal.onData((data) => {
            const mapped = mapInput(data);
            if (mapped) {
                keyQueue.push(mapped);
            }
        });

        window.addEventListener("resize", () => syncTerminalGeometry());

        window.snake3dBridge = {
            write(text) {
                terminal.write(String(text));
            },
            flush() {
                // xterm writes immediately; flush is intentionally a no-op.
            },
            clear() {
                terminal.clear();
            },
            pop_key() {
                if (keyQueue.length === 0) {
                    return null;
                }
                return keyQueue.shift();
            },
            terminal_columns() {
                syncTerminalGeometry();
                return measuredCols;
            },
            terminal_rows() {
                syncTerminalGeometry();
                return measuredRows;
            },
            should_stop() {
                return stopRequested;
            },
        };

        async function mountSourceFiles(pyodideInstance) {
            for (const path of SOURCE_FILES) {
                const response = await fetch(`/${path}`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${path}: ${response.status}`);
                }
                const code = await response.text();
                const fsPath = `/workspace/${path}`;
                const parts = fsPath.split("/").slice(1, -1);
                let current = "";
                for (const part of parts) {
                    current += `/${part}`;
                    try {
                        pyodideInstance.FS.mkdir(current);
                    } catch {
                        // Directory may already exist.
                    }
                }
                pyodideInstance.FS.writeFile(fsPath, code, { encoding: "utf8" });
            }

            pyodideInstance.runPython(`
import sys
if "/workspace/src" not in sys.path:
    sys.path.insert(0, "/workspace/src")
`);
        }

        async function ensurePyodideReady() {
            if (pyodide) {
                return pyodide;
            }

            setStatus("Loading Pyodide runtime...");
            pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy"]);
            await mountSourceFiles(pyodide);
            setStatus("Runtime ready. Press Start Game.");
            return pyodide;
        }

        function readConfig() {
            const width = Number(document.getElementById("width").value);
            const height = Number(document.getElementById("height").value);
            const depth = Number(document.getElementById("depth").value);
            const tickRate = Number(document.getElementById("tickRate").value);

            if ([width, height, depth].some((value) => !Number.isFinite(value) || value < 4)) {
                throw new Error("All dimensions must be numbers >= 4.");
            }
            if (!Number.isFinite(tickRate) || tickRate <= 0) {
                throw new Error("Tick rate must be a positive number.");
            }

            return {
                width,
                height,
                depth,
                tickRate,
            };
        }

        async function runGame() {
            const runtime = await ensurePyodideReady();
            const config = readConfig();

            stopRequested = false;
            restartRequested = false;
            keyQueue.length = 0;
            gameRunning = true;
            syncTerminalGeometry();
            startButton.textContent = "Running...";
            startButton.disabled = true;
            setStatus(
                `Game started (${measuredCols}x${measuredRows}). Focus the terminal and use WASD/arrows, E/Q, P, N, C.`
            );

            runtime.globals.set("ui_width", config.width);
            runtime.globals.set("ui_height", config.height);
            runtime.globals.set("ui_depth", config.depth);
            runtime.globals.set("ui_tick_rate", config.tickRate);

            const pythonCode = `
import asyncio
import os
import random
import time
import traceback

from js import snake3dBridge

from snake3d.adapters.terminal_renderer import TerminalRenderer
from snake3d.core.engine import Engine
from snake3d.core.models import GameConfig
from snake3d.core.state import create_initial_state
from snake3d.ports.input import InputAction, InputActionType


class BrowserStream:
    def write(self, text):
        snake3dBridge.write(text)

    def flush(self):
        snake3dBridge.flush()


class BrowserInput:
    def __init__(self, controls):
        self.controls = controls
        self.horizontal = controls.horizontal_direction_by_key()
        self.vertical = controls.vertical_direction_by_key()
        self.extended_horizontal = {
            "ext:h": self.horizontal[controls.left],
            "ext:p": self.horizontal[controls.backward],
            "ext:k": self.horizontal[controls.forward],
            "ext:m": self.horizontal[controls.right],
        }
        self.last_vertical_key = None
        self.last_vertical_time = 0.0
        self.vertical_repeat_guard = 0.18

    def _is_repeated_vertical_hold(self, key):
        now = time.monotonic()
        repeated = (
            key == self.last_vertical_key
            and (now - self.last_vertical_time) < self.vertical_repeat_guard
        )
        self.last_vertical_key = key
        self.last_vertical_time = now
        return repeated

    def poll_action(self):
        key = snake3dBridge.pop_key()
        if key is None:
            return None

        if key in self.horizontal:
            self.last_vertical_key = None
            return InputAction(InputActionType.DIRECTION, self.horizontal[key])
        if key in self.extended_horizontal:
            self.last_vertical_key = None
            return InputAction(InputActionType.DIRECTION, self.extended_horizontal[key])
        if key in self.vertical:
            if self._is_repeated_vertical_hold(key):
                return None
            return InputAction(InputActionType.VERTICAL, self.vertical[key])
        if key == self.controls.pause:
            return InputAction(InputActionType.PAUSE)
        if key == self.controls.restart:
            return InputAction(InputActionType.RESTART)
        if key == self.controls.quit or key == "esc":
            return InputAction(InputActionType.QUIT)
        return None


async def run_loop():
    os.environ["COLUMNS"] = str(int(snake3dBridge.terminal_columns()))
    os.environ["LINES"] = str(int(snake3dBridge.terminal_rows()))

    config = GameConfig(
        width=int(ui_width),
        height=int(ui_height),
        depth=int(ui_depth),
        tick_rate_hz=float(ui_tick_rate),
        fruit_count=3,
    )

    rng = random.Random()
    renderer = TerminalRenderer(config, stream=BrowserStream(), use_nerd_font=False)
    engine = Engine(
        config=config,
        state=create_initial_state(config, rng),
        renderer=renderer,
        input_provider=BrowserInput(config.controls),
        rng=rng,
        restart_factory=lambda: create_initial_state(config, random.Random()),
    )

    tick_interval = 1.0 / config.tick_rate_hz
    renderer.initialize()
    renderer.render(engine.state)
    next_tick = time.monotonic() + tick_interval

    try:
        while not engine.quit_requested and not bool(snake3dBridge.should_stop()):
            os.environ["COLUMNS"] = str(int(snake3dBridge.terminal_columns()))
            os.environ["LINES"] = str(int(snake3dBridge.terminal_rows()))
            engine.handle_action(engine.input_provider.poll_action())
            if engine.quit_requested:
                break

            now = time.monotonic()
            if now >= next_tick:
                engine.tick()
                next_tick += tick_interval
                continue

            await asyncio.sleep(min(next_tick - now, 0.01))
    finally:
        renderer.shutdown()


try:
    await run_loop()
except Exception:
    snake3dBridge.write("\\r\\nUnhandled error in Python runtime:\\r\\n")
    snake3dBridge.write(traceback.format_exc())
`;

            try {
                await runtime.runPythonAsync(pythonCode);
                if (restartRequested) {
                    setStatus("Restarting game...");
                } else {
                    setStatus("Game ended. Press Start Game to run again.");
                }
            } finally {
                gameRunning = false;
                startButton.disabled = false;
                startButton.textContent = "Start Game";
                stopRequested = false;

                if (restartRequested) {
                    restartRequested = false;
                    await runGame();
                }
            }
        }

        startButton.addEventListener("click", async () => {
            if (gameRunning) {
                stopRequested = true;
                return;
            }

            try {
                await runGame();
            } catch (error) {
                setStatus(`Error: ${error.message}`);
                terminal.write(`\r\nError: ${error.message}\r\n`);
                gameRunning = false;
                startButton.disabled = false;
                startButton.textContent = "Start Game";
            }
        });

        restartButton.addEventListener("click", async () => {
            if (gameRunning) {
                restartRequested = true;
                stopRequested = true;
                setStatus("Force restart requested...");
                return;
            }

            try {
                await runGame();
            } catch (error) {
                setStatus(`Error: ${error.message}`);
                terminal.write(`\r\nError: ${error.message}\r\n`);
            }
        });

        ensurePyodideReady().catch((error) => {
            setStatus(`Failed to initialize: ${error.message}`);
            terminal.write(`\r\nInitialization failed: ${error.message}\r\n`);
        });
    </script>
</body>

</html>
